<!DOCTYPE html>
<html lang="sv">

<head>
    <script src="https://helpdesk.karlbergsolutions.se/embed.js" data-pub="68fa4f306255afdb19b29043"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogg - Kryptokom</title>
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tektur:wght@400..900&display=swap" rel="stylesheet">
    
    <!-- Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <!-- YAML parser for frontmatter -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
</head>

<body>
    <div id="scroll-progress"></div>

    <header class="site-header">
        <div class="logo-container">
            <img src="../images/logotype.png" alt="Kryptokom logotyp" class="logo">
            <div class="logo-text">
                <h1>Kryptokom</h1>
                <p>Framtidens ekonomi börjar här</p>
            </div>
        </div>
        <nav id="nav-menu">
            <ul>
                <li><a href="../index.html">Hem</a></li>
                <li><a href="../index.html#features">Varför gå med?</a></li>
                <li><a href="../index.html#about">Om oss</a></li>
                <li><a href="../index.html#partners">För företag</a></li>
                <li><a href="../blogg/" class="active">Blogg</a></li>
                <li><a href="../index.html#contact">Kontakt</a></li>
            </ul>
        </nav>
        <div id="menu-toggle" class="menu-icon">☰</div>
    </header>

    <section class="section blog-hero">
        <div class="content">
            <h2>Våra aktiviteter</h2>
            <p class="section-subtitle">Nyfiken vad vi gör? Läs senaste händelserna!</p>
        </div>
    </section>

    <section class="section blog-section">
        <div class="blog-container" id="blog-posts">
            <!-- Blogginlägg laddas dynamiskt här -->
            <div class="loading-message">
                <p>Laddar blogginlägg...</p>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2025 Kryptokom</p>
    </footer>

    <script src="../script.js"></script>
    <script>
        // Markdown Blog Loader
        (async function() {
            const blogContainer = document.getElementById('blog-posts');
            
            try {
                // Ladda listan över posts
                const response = await fetch('posts.json');
                const posts = await response.json();
                
                // Töm loading-meddelande
                blogContainer.innerHTML = '';
                
                // Ladda varje post
                for (const post of posts) {
                    try {
                        const mdResponse = await fetch(`inlagg/${post.filename}`);
                        const mdText = await mdResponse.text();
                        
                        // Separera frontmatter och content
                        const parts = mdText.split('---');
                        if (parts.length < 3) {
                            console.error(`Invalid frontmatter in ${post.filename}`);
                            continue;
                        }
                        
                        // Parse frontmatter (YAML)
                        const frontmatter = jsyaml.load(parts[1]);
                        const content = parts.slice(2).join('---').trim();
                        
                        // Konvertera markdown till HTML
                        const htmlContent = marked.parse(content);
                        
                        // Skapa blogginlägg HTML
                        const article = document.createElement('article');
                        article.className = 'blog-post fade-in-element';
                        
                        // Formatera datum (svensk stil)
                        const date = new Date(frontmatter.date);
                        const formattedDate = date.toLocaleDateString('sv-SE', {
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric'
                        });
                        
                        // Skapa taggar HTML
                        const tagsHTML = frontmatter.tags
                            .map(tag => `<span class="tag">${tag}</span>`)
                            .join('');
                        
                        // Extrahera första stycket som sammanfattning
                        const firstParagraph = htmlContent.match(/<p>(.*?)<\/p>/)?.[1] || '';
                        
                        article.innerHTML = `
                            <div class="blog-image">
                                <img src="bilder/${frontmatter.image}" 
                                     alt="${frontmatter.title}" 
                                     onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22800%22 height=%22400%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22800%22 height=%22400%22/%3E%3Ctext fill=%22%239ca3af%22 font-family=%22Arial%22 font-size=%2224%22 text-anchor=%22middle%22 x=%22400%22 y=%22200%22%3E${frontmatter.title}%3C/text%3E%3C/svg%3E'">
                            </div>
                            <div class="blog-content">
                                <div class="blog-meta">
                                    <span class="blog-date">📅 ${formattedDate}</span>
                                    <span class="blog-category">${frontmatter.category}</span>
                                </div>
                                <h3>${frontmatter.title}</h3>
                                <p>${firstParagraph}</p>
                                <div class="blog-tags">
                                    ${tagsHTML}
                                </div>
                            </div>
                        `;
                        
                        // Lägg till click-event för att visa hela inlägget
                        article.style.cursor = 'pointer';
                        article.addEventListener('click', () => {
                            showFullPost(frontmatter, htmlContent, post.slug);
                        });
                        
                        blogContainer.appendChild(article);
                        
                        // Triggera scroll-animation
                        setTimeout(() => {
                            article.classList.add('fade-in-visible');
                        }, 100);
                        
                    } catch (error) {
                        console.error(`Error loading post ${post.filename}:`, error);
                    }
                }
                
            } catch (error) {
                console.error('Error loading posts:', error);
                blogContainer.innerHTML = '<p style="color: #FF69B4; text-align: center;">Kunde inte ladda blogginlägg. Försök igen senare.</p>';
            }
        })();
        
        // Funktion för att visa hela inlägget på separat sida
        function showFullPost(frontmatter, htmlContent, slug) {
            // Navigera till post.html med slug som parameter
            window.location.href = `post.html?slug=${slug}`;
        }
    </script>
</body>

</html>
